name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Create Cordova project
      run: |
        cordova create zhi-haocai com.zhihaocai.app "智耗材"
        cd zhi-haocai
        cordova platform add android
    
    - name: Copy web files
      run: |
        mkdir -p zhi-haocai/www/js/lib
        cp index.html zhi-haocai/www/
        cp manifest.json sw.js zhi-haocai/www/
        cp icon-192.png icon-512.png zhi-haocai/www/
        cp -r css zhi-haocai/www/
        cp js/app.js js/data.js zhi-haocai/www/js/
        cp js/lib/vue.esm-browser.js zhi-haocai/www/js/lib/
    
    - name: Build APK
      run: |
        cd zhi-haocai
        cordova build android
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: zhi-haocai-app
        path: zhi-haocai/platforms/android/app/build/outputs/apk/debug/app-debug.apk
